upstream uzlife_api {
    server web:8000;
}

server {
    listen 80;
    server_name _;

    # Yuklanadigan rasm hajmi (cover_image)
    client_max_body_size 20M;

    # Statik fayllar (admin + DRF browsable API)
    location /static/ {
        alias /app/staticfiles/;
        access_log off;
        expires 30d;
    }

    # Media (yuklangan rasmlar)
    location /media/ {
        alias /app/media/;
        access_log off;
        expires 7d;
    }

    # Qolgan barcha so'rovlar — Django/gunicorn
    location / {
        proxy_pass http://uzlife_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
